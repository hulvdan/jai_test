# https://pre-commit.com/
default_install_hook_types:
- pre-commit
- pre-push

repos:
- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
  - id: python-no-eval
    name: 'Prohibited: "nocheckin"'
    entry: "nocheckin"
    language: pygrep
    files: ^(?!.pre-commit-config).*\.(h|c|hpp|cpp|json|jsonc|yaml|yml|txt|py|md|toml|cfg|gd)$
    exclude: ^addons/.*$
    types: []
  - id: python-no-eval
    name: 'Prohibited: "def test_". Use "def _test_"'
    entry: "def test_"
    language: pygrep
    files: ^.*\.py$
    exclude: ^addons/.*$
    types: []
- repo: https://github.com/google/yamlfmt
  rev: v0.21.0
  hooks:
  - id: yamlfmt
    language: system
    exclude: ^addons/.*$
- repo: https://github.com/JohnnyMorganz/StyLua
  rev: v2.3.1
  hooks:
  - id: stylua
    exclude: ^addons/.*$
