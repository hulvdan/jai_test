- repo: local
  hooks:
  - id: prettier
    name: prettier
    entry: prettier --parser json --write
    language: system
    require_serial: true
    files: \.(json|ldtk)$
    stages: [pre-commit, pre-merge-commit, manual]
  # - id: proto-renumber
  #   name: proto-renumber
  #   entry: uv run python cli/bf_cli.py proto_renumber
  #   language: system
  #   require_serial: true
  #   always_run: true
  #   pass_filenames: false
  #   stages: [pre-commit, pre-merge-commit, manual]
  # - id: buf-format
  #   name: buf format
  #   entry: buf format -w src
  #   language: system
  #   require_serial: true
  #   always_run: true
  #   pass_filenames: false
  #   stages: [pre-commit, pre-merge-commit, manual]
  # - id: ty-check
  #   name: ty check
  #   entry: ty check cli --output-format=concise --no-progress
  #   language: system
  #   require_serial: true
  #   files: \.py$
  #   stages: [pre-commit, pre-merge-commit, manual]
  - id: tombi-format
    name: tombi format
    entry: uvx tombi format
    language: system
    require_serial: true
    files: \.toml$
    stages: [pre-commit, pre-merge-commit, manual]
  - id: yamllint
    name: yamllint
    entry: uv run yamllint
    language: system
    require_serial: true
    files: \.(yml|yaml|yamlfmt|yamllint)$
    stages: [pre-commit, pre-merge-commit, manual]
  - id: cog-readme
    name: cog-readme
    entry: uv run cog -n utf-8 -U -r -P --markers="[[[cog cog]]] [[[end]]]" README.md
    stages: [pre-commit, pre-merge-commit, manual]
    require_serial: true
    pass_filenames: false
    always_run: true
    language: system
